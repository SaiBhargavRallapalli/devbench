name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  ci:
    name: CI Gate
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint --if-present

      - name: Type check
        run: npx tsc --noEmit

      - name: Build
        run: npm run build

      - name: Bundle size report
        run: |
          echo "=== Top 15 largest JS chunks ==="
          find .next/static/chunks -name "*.js" ! -name "*.js.map" \
            -exec du -sh {} + 2>/dev/null | sort -rh | head -15
          echo ""
          echo "=== Total static JS ==="
          du -sh .next/static/chunks/ 2>/dev/null || true

      - name: Run tests
        run: npm test --if-present

      - name: Start server for Lighthouse
        run: |
          npm run start > /tmp/server.log 2>&1 &
          SERVER_PID=$!
          echo "Server PID: $SERVER_PID"
          
          # Wait for server to be ready (max 60 seconds)
          for i in {1..30}; do
            if curl -s http://localhost:3000 > /dev/null 2>&1; then
              echo "Server is ready!"
              exit 0
            fi
            echo "Waiting for server... ($i/30)"
            sleep 2
          done
          
          echo "Server failed to start!"
          cat /tmp/server.log
          exit 1

      - name: Lighthouse CI
        run: npx lhci autorun
        continue-on-error: true
        env:
          PORT: 3000

      - name: Check Lighthouse results
        if: always()
        run: |
          echo "Lighthouse CI completed. Check logs above for details."
